kind = "web"
  previewPath = "/"
  title = "Оратория"
  version = "1.0.0"
  id = "oratoria_web_mvp_0001"

  [[services]]
  localPort = 3000
  name = "web"
  paths = ["/"]

  [services.env]
  PORT = "3000"

  [services.development]
  run = "pnpm --filter @workspace/oratoria run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/oratoria", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"

  [services.production.run]
  args = ["pnpm", "--filter", "@workspace/oratoria", "run", "start"]

  [services.production.run.env]
  PORT = "3000"
  NODE_ENV = "production"
  